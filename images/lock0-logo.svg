<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Yellow circle background -->
  <circle cx="30" cy="30" r="24" fill="#FFC519"/>

  <!-- Lock icon -->
  <g transform="translate(30, 30)">
    <!-- Lock body -->
    <rect x="-7" y="0" width="14" height="12" rx="2" fill="black"/>

    <!-- Lock shackle -->
    <path d="M -4 0 L -4 -5 A 4 4 0 0 1 4 -5 L 4 0"
          stroke="black"
          stroke-width="2.5"
          fill="none"
          stroke-linecap="round"/>

    <!-- Keyhole -->
    <circle cx="0" cy="4" r="2" fill="#FFC519"/>
    <rect x="-0.75" y="4" width="1.5" height="4" rx="0.5" fill="#FFC519"/>
  </g>

  <!-- Lock0 text -->
  <text x="65" y="42"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="32"
        font-weight="700"
        fill="black">Lock0</text>
</svg>
