<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Link Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        code { font-family: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', monospace; }

        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Autocomplete dropdown */
        .autocomplete-dropdown {
            max-height: 300px;
            overflow-y: auto;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .autocomplete-item {
            cursor: pointer;
            transition: background-color 0.15s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .autocomplete-item:hover, .autocomplete-item.selected {
            background-color: #f1f5f9;
        }
        .preview-icon {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            object-fit: contain;
            border-radius: 6px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 4px;
        }
        .file-icon {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            color: #64748b;
        }
        #chevronIcon {
            transition: transform 0.2s ease;
        }

        /* Font preview styling */
        #fontPreviewText, #fontPreviewAlphabet {
            font-weight: normal !important;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-900">

    <div class="max-w-2xl mx-auto space-y-6">
        <!-- Header -->
        <header class="flex items-center space-x-3 mb-8">
            <div class="bg-black text-white p-2.5 rounded-xl shadow-lg shadow-slate-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-github"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.28 1.15-.28 2.35 0 3.5-.73 1.02-1.08 2.25-1 3.5 0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Repo Link Generator</h1>
                <a href="https://github.com/awhitmana0/awhitmana0.github.io/tree/main" target="_blank" rel="noopener noreferrer" class="text-sm text-slate-500 font-medium hover:text-blue-600 transition-colors">awhitmana0.github.io</a>
            </div>
        </header>

        <!-- Main Tool Card -->
        <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-200 p-6 md:p-8 space-y-8 relative overflow-hidden">
            
            <!-- Loading State -->
            <div id="loading" class="flex flex-col items-center justify-center py-10 space-y-4">
                <div class="flex space-x-2">
                    <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce"></div>
                    <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce [animation-delay:-.3s]"></div>
                    <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce [animation-delay:-.5s]"></div>
                </div>
                <span class="text-sm text-slate-500 font-semibold uppercase tracking-wider">Indexing Repository...</span>
            </div>

            <!-- Error State (Hidden by default) -->
            <div id="errorBox" class="hidden p-4 bg-red-50 border border-red-100 rounded-xl text-red-700 text-sm">
                <p id="errorMessage"></p>
            </div>

            <!-- Input Section -->
            <div id="toolUI" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
                
                <!-- File Selection -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">Search Files</label>
                    <div class="relative">
                        <input
                            id="fileSearch"
                            type="text"
                            autocomplete="off"
                            placeholder="Type to search through all files..."
                            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all text-lg"
                            oninput="handleSearch()"
                            onkeydown="handleKeyDown(event)"
                            onfocus="handleSearch()"
                        >
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        </div>
                        <!-- Autocomplete Dropdown -->
                        <div id="autocompleteDropdown" class="hidden absolute top-full left-0 right-0 mt-2 bg-white border border-slate-200 rounded-2xl autocomplete-dropdown z-50"></div>
                    </div>
                </div>

                <!-- File Type Filters -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">Filter by Type</label>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="filterFiles('all')" id="filter-all" class="px-4 py-2 rounded-xl font-semibold text-sm transition-all bg-blue-500 text-white shadow-sm">
                            All Files
                        </button>
                        <button onclick="filterFiles('image')" id="filter-image" class="px-4 py-2 rounded-xl font-semibold text-sm transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                            Images
                        </button>
                        <button onclick="filterFiles('font')" id="filter-font" class="px-4 py-2 rounded-xl font-semibold text-sm transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                            Fonts
                        </button>
                        <button onclick="filterFiles('code')" id="filter-code" class="px-4 py-2 rounded-xl font-semibold text-sm transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                            Code
                        </button>
                        <button onclick="filterFiles('template')" id="filter-template" class="px-4 py-2 rounded-xl font-semibold text-sm transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                            Templates
                        </button>
                        <button onclick="filterFiles('other')" id="filter-other" class="px-4 py-2 rounded-xl font-semibold text-sm transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                            Other
                        </button>
                    </div>
                </div>

                <!-- Tags (subdirectory filters) -->
                <div id="tagsContainer" class="hidden space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">Filter by Tags</label>
                    <div id="tagsList" class="flex flex-wrap gap-2"></div>
                </div>

                <!-- Filtered Files List -->
                <div class="space-y-2">
                    <button
                        id="toggleFilesList"
                        onclick="toggleFilesList()"
                        class="flex items-center justify-between w-full px-4 py-3 bg-slate-50 hover:bg-slate-100 rounded-xl transition-all group"
                    >
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-bold text-slate-700">Matching Files</span>
                            <span id="filesCount" class="text-xs font-semibold text-slate-500 bg-slate-200 px-2 py-0.5 rounded-full">0</span>
                        </div>
                        <svg id="chevronIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down text-slate-400 transition-transform"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                    <div id="filesList" class="hidden bg-slate-50 rounded-xl border border-slate-200 max-h-96 overflow-y-auto">
                        <div id="filesListContent" class="divide-y divide-slate-200"></div>
                    </div>
                </div>

                <!-- Image Preview -->
                <div id="imagePreviewContainer" class="hidden pt-4 space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">Preview</label>
                    <div class="bg-slate-100 rounded-2xl p-8 border border-slate-200 flex items-center justify-center">
                        <img id="imagePreview" src="" alt="Preview" class="max-w-full max-h-64 rounded-lg">
                    </div>
                </div>

                <!-- Font Preview -->
                <div id="fontPreviewContainer" class="hidden pt-4 space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">Font Preview</label>
                    <div class="bg-slate-50 rounded-2xl p-6 border border-slate-200 space-y-4">
                        <div id="fontPreviewText" class="text-4xl font-normal" style="font-family: 'PreviewFont', sans-serif;">
                            The quick brown fox jumps over the lazy dog
                        </div>
                        <div id="fontPreviewAlphabet" class="text-lg text-slate-600" style="font-family: 'PreviewFont', sans-serif;">
                            ABCDEFGHIJKLMNOPQRSTUVWXYZ<br>
                            abcdefghijklmnopqrstuvwxyz<br>
                            0123456789
                        </div>
                    </div>
                </div>

                <!-- Output Display -->
                <div class="pt-4 space-y-3">
                    <div class="flex justify-between items-end px-1">
                        <label class="text-sm font-bold text-slate-700">Generated URL</label>
                        <span id="copyStatus" class="text-[10px] uppercase font-bold text-blue-600 opacity-0 transition-opacity">Copied!</span>
                    </div>
                    <div class="relative group">
                        <div class="absolute -inset-0.5 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-1000 group-hover:duration-200"></div>
                        <div class="relative bg-slate-900 rounded-2xl p-6 overflow-hidden">
                            <pre id="output" class="text-blue-300 text-sm overflow-x-auto whitespace-pre-wrap break-all leading-relaxed min-h-[1.5rem] font-mono">Select a file from your repository above...</pre>
                            
                            <button 
                                id="copyBtn"
                                onclick="copyToClipboard()"
                                class="absolute right-3 top-3 p-2.5 bg-white/10 hover:bg-white/20 text-white rounded-xl transition-all border border-white/10 backdrop-blur-sm"
                                title="Copy to clipboard"
                            >
                                <svg id="copyIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-copy"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                <svg id="checkIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check hidden text-emerald-400"><path d="M20 6 9 17l-5-5"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const OWNER = 'awhitmana0';
        const REPO = 'awhitmana0.github.io';
        let allFiles = [];
        let manifestData = {}; // Store full manifest data
        let currentFilter = 'all';
        let currentTag = null;
        let selectedIndex = -1;

        // File type extensions
        const IMAGE_EXTS = ['.svg', '.png', '.jpg', '.jpeg', '.gif', '.webp'];
        const FONT_EXTS = ['.woff', '.woff2', '.ttf', '.otf'];
        const CODE_EXTS = ['.js', '.css', '.html', '.json', '.yml', '.yaml'];
        const TEMPLATE_EXTS = ['.handlebars', '.hbs'];

        function getFileType(path) {
            const ext = '.' + path.split('.').pop().toLowerCase();
            if (IMAGE_EXTS.includes(ext)) return 'image';
            if (FONT_EXTS.includes(ext)) return 'font';
            if (CODE_EXTS.includes(ext)) return 'code';
            if (TEMPLATE_EXTS.includes(ext)) return 'template';
            return 'other';
        }

        function isImageFile(path) {
            return getFileType(path) === 'image';
        }

        function isFontFile(path) {
            return getFileType(path) === 'font';
        }

        function getFileTags(path) {
            // Get all tags (auto + manual) for a file
            const fileData = manifestData[path];
            if (!fileData) return [];

            const autoTags = fileData.auto_tags || [];
            const manualTags = fileData.manual_tags || [];

            return [...autoTags, ...manualTags];
        }

        function smartMatch(path, query) {
            // Match at the start of path segments or word boundaries
            const lowerPath = path.toLowerCase();
            const lowerQuery = query.toLowerCase();

            // Split by / and check if any segment starts with the query
            const segments = lowerPath.split('/');
            for (const segment of segments) {
                if (segment.startsWith(lowerQuery)) {
                    return true;
                }

                // Also check word boundaries within segments (split by -, _, space, or camelCase)
                const words = segment.split(/[-_\s]+/);
                for (const word of words) {
                    if (word.startsWith(lowerQuery)) {
                        return true;
                    }
                }
            }

            return false;
        }

        function getFilteredFiles() {
            let files = currentFilter === 'all'
                ? allFiles
                : allFiles.filter(path => getFileType(path) === currentFilter);

            // Apply tag filter if active
            if (currentTag) {
                files = files.filter(path => {
                    const tags = getFileTags(path);
                    return tags.includes(currentTag);
                });
            }

            return files;
        }

        function extractTags() {
            const filteredByType = currentFilter === 'all'
                ? allFiles
                : allFiles.filter(path => getFileType(path) === currentFilter);

            const allTags = new Set();
            filteredByType.forEach(path => {
                const tags = getFileTags(path);
                tags.forEach(tag => allTags.add(tag));
            });

            return Array.from(allTags).sort();
        }

        function updateTags() {
            const tags = extractTags();
            const tagsContainer = document.getElementById('tagsContainer');
            const tagsList = document.getElementById('tagsList');

            if (tags.length === 0) {
                tagsContainer.classList.add('hidden');
                return;
            }

            tagsContainer.classList.remove('hidden');
            tagsList.innerHTML = '';

            // Add "All" tag
            const allTag = document.createElement('button');
            allTag.textContent = 'All';
            allTag.className = currentTag === null
                ? 'px-3 py-1.5 rounded-lg font-medium text-xs transition-all bg-blue-500 text-white'
                : 'px-3 py-1.5 rounded-lg font-medium text-xs transition-all bg-slate-100 text-slate-600 hover:bg-slate-200';
            allTag.onclick = () => filterByTag(null);
            tagsList.appendChild(allTag);

            // Add subdirectory tags
            tags.forEach(tag => {
                const tagBtn = document.createElement('button');
                tagBtn.textContent = tag;
                tagBtn.className = currentTag === tag
                    ? 'px-3 py-1.5 rounded-lg font-medium text-xs transition-all bg-blue-500 text-white'
                    : 'px-3 py-1.5 rounded-lg font-medium text-xs transition-all bg-slate-100 text-slate-600 hover:bg-slate-200';
                tagBtn.onclick = () => filterByTag(tag);
                tagsList.appendChild(tagBtn);
            });
        }

        function filterByTag(tag) {
            currentTag = tag;
            updateTags();
            document.getElementById('fileSearch').value = '';
            document.getElementById('autocompleteDropdown').classList.add('hidden');
            updateFilesList();
            updateSnippet();
        }

        function toggleFilesList() {
            const filesList = document.getElementById('filesList');
            const chevronIcon = document.getElementById('chevronIcon');

            if (filesList.classList.contains('hidden')) {
                filesList.classList.remove('hidden');
                chevronIcon.style.transform = 'rotate(180deg)';
            } else {
                filesList.classList.add('hidden');
                chevronIcon.style.transform = 'rotate(0deg)';
            }
        }

        function updateFilesList() {
            const searchQuery = document.getElementById('fileSearch').value.trim();
            let files = getFilteredFiles();

            // Apply search filter if present
            if (searchQuery) {
                files = files.filter(path => smartMatch(path, searchQuery));
            }

            const filesCount = document.getElementById('filesCount');
            const filesListContent = document.getElementById('filesListContent');

            filesCount.textContent = files.length;

            if (files.length === 0) {
                filesListContent.innerHTML = '<div class="px-4 py-8 text-center text-sm text-slate-500">No files match the current filters</div>';
                return;
            }

            // Sort files alphabetically
            files.sort();

            filesListContent.innerHTML = files.map((path, index) => {
                const isImage = isImageFile(path);
                const isFont = isFontFile(path);
                const encodedPath = path.split('/').map(encodeURIComponent).join('/');
                const fileUrl = `https://${OWNER}.github.io/${encodedPath}`;

                let iconHtml = '';
                let textStyle = '';

                if (isImage) {
                    iconHtml = `<img src="${fileUrl}" class="preview-icon" alt="">`;
                } else if (isFont) {
                    const ext = path.split('.').pop().toUpperCase().substring(0, 4);
                    iconHtml = `<div class="file-icon">${ext}</div>`;
                    // Load font and apply it to the text
                    const fontFamily = loadFontForListItem(fileUrl, `list_${index}`);
                    textStyle = ` style="font-family: '${fontFamily}', sans-serif; font-size: 16px;"`;
                } else {
                    const ext = path.split('.').pop().toUpperCase().substring(0, 4);
                    iconHtml = `<div class="file-icon">${ext}</div>`;
                }

                return `
                    <div class="flex items-center gap-3 px-4 py-3 hover:bg-white transition-colors cursor-pointer"
                         onclick="selectFile('${path.replace(/'/g, "\\'")}')">
                        ${iconHtml}
                        <span class="flex-1 text-sm text-slate-700"${textStyle}>${path}</span>
                    </div>
                `;
            }).join('');
        }

        function handleSearch() {
            const searchInput = document.getElementById('fileSearch');
            const query = searchInput.value.trim();
            const dropdown = document.getElementById('autocompleteDropdown');

            selectedIndex = -1;

            // Update the files list
            updateFilesList();

            if (query === '') {
                dropdown.classList.add('hidden');
                updateSnippet();
                return;
            }

            const filteredFiles = getFilteredFiles();
            const matches = filteredFiles.filter(path => smartMatch(path, query));

            if (matches.length === 0) {
                dropdown.classList.add('hidden');
                updateSnippet();
                return;
            }

            // Limit to 10 results
            const displayMatches = matches.slice(0, 10);

            dropdown.innerHTML = displayMatches.map((path, index) => {
                const isImage = isImageFile(path);
                const isFont = isFontFile(path);
                const encodedPath = path.split('/').map(encodeURIComponent).join('/');
                const fileUrl = `https://${OWNER}.github.io/${encodedPath}`;

                let iconHtml = '';
                if (isImage) {
                    iconHtml = `<img src="${fileUrl}" class="preview-icon" alt="">`;
                } else {
                    const ext = path.split('.').pop().toUpperCase().substring(0, 4);
                    iconHtml = `<div class="file-icon">${ext}</div>`;
                }

                return `
                    <div class="autocomplete-item px-5 py-3 text-sm border-b border-slate-100 last:border-b-0"
                         data-index="${index}"
                         data-path="${path}"
                         onclick="selectFile('${path.replace(/'/g, "\\'")}')">
                        ${iconHtml}
                        <span class="flex-1">${highlightMatch(path, query)}</span>
                    </div>
                `;
            }).join('');

            dropdown.classList.remove('hidden');
            updateSnippet();
        }

        function highlightMatch(path, query) {
            const index = path.toLowerCase().indexOf(query.toLowerCase());
            if (index === -1) return path;

            const before = path.substring(0, index);
            const match = path.substring(index, index + query.length);
            const after = path.substring(index + query.length);

            return `${before}<span class="font-semibold text-blue-600">${match}</span>${after}`;
        }

        function selectFile(path) {
            document.getElementById('fileSearch').value = path;
            document.getElementById('autocompleteDropdown').classList.add('hidden');
            selectedIndex = -1;
            updateSnippet();
        }

        function handleKeyDown(event) {
            const dropdown = document.getElementById('autocompleteDropdown');
            const items = dropdown.querySelectorAll('.autocomplete-item');

            if (dropdown.classList.contains('hidden') || items.length === 0) {
                return;
            }

            if (event.key === 'ArrowDown') {
                event.preventDefault();
                selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
                updateSelection(items);
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                selectedIndex = Math.max(selectedIndex - 1, -1);
                updateSelection(items);
            } else if (event.key === 'Enter') {
                event.preventDefault();
                if (selectedIndex >= 0 && selectedIndex < items.length) {
                    const path = items[selectedIndex].getAttribute('data-path');
                    selectFile(path);
                }
            } else if (event.key === 'Escape') {
                dropdown.classList.add('hidden');
                selectedIndex = -1;
            }
        }

        function updateSelection(items) {
            items.forEach((item, index) => {
                if (index === selectedIndex) {
                    item.classList.add('selected');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        function filterFiles(type) {
            currentFilter = type;
            currentTag = null; // Reset tag when changing type

            // Update button styles
            document.querySelectorAll('[id^="filter-"]').forEach(btn => {
                btn.classList.remove('bg-blue-500', 'text-white', 'shadow-sm');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });

            const activeBtn = document.getElementById(`filter-${type}`);
            activeBtn.classList.remove('bg-slate-100', 'text-slate-600');
            activeBtn.classList.add('bg-blue-500', 'text-white', 'shadow-sm');

            // Update tags based on new filter
            updateTags();

            // Clear search and refresh dropdown
            document.getElementById('fileSearch').value = '';
            document.getElementById('autocompleteDropdown').classList.add('hidden');
            updateFilesList();
            updateSnippet();
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (event) => {
            const searchInput = document.getElementById('fileSearch');
            const dropdown = document.getElementById('autocompleteDropdown');

            if (searchInput && dropdown && !searchInput.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
            }
        });

        async function init() {
            const loading = document.getElementById('loading');
            const toolUI = document.getElementById('toolUI');
            const errorBox = document.getElementById('errorBox');
            const errorMessage = document.getElementById('errorMessage');

            try {
                // Fetch the manifest.json file from the repo
                const response = await fetch(`https://${OWNER}.github.io/manifest.json`);

                if (!response.ok) throw new Error('Could not fetch manifest.json. Run the organize script first.');

                const manifest = await response.json();

                // Store full manifest data
                manifestData = {};
                manifest.files.forEach(file => {
                    manifestData[file.path] = file;
                });

                // Extract file paths from manifest
                allFiles = manifest.files.map(file => file.path);

                loading.classList.add('hidden');
                toolUI.classList.remove('hidden');

                // Initialize tags and files list
                updateTags();
                updateFilesList();
            } catch (err) {
                loading.classList.add('hidden');
                errorBox.classList.remove('hidden');
                errorMessage.innerText = err.message;
            }
        }

        function updateSnippet() {
            const path = document.getElementById('fileSearch').value.trim();
            const output = document.getElementById('output');
            const imagePreviewContainer = document.getElementById('imagePreviewContainer');
            const imagePreview = document.getElementById('imagePreview');
            const fontPreviewContainer = document.getElementById('fontPreviewContainer');

            if (!path) {
                output.innerText = "Select a file from your repository above...";
                output.classList.add('text-slate-500');
                output.classList.remove('text-blue-300');
                imagePreviewContainer.classList.add('hidden');
                fontPreviewContainer.classList.add('hidden');
                return;
            }

            // Validate file exists
            if (!allFiles.includes(path)) {
                output.innerText = "File not found. Please select from the list.";
                output.classList.add('text-slate-500');
                output.classList.remove('text-blue-300');
                imagePreviewContainer.classList.add('hidden');
                fontPreviewContainer.classList.add('hidden');
                return;
            }

            output.classList.remove('text-slate-500');
            output.classList.add('text-blue-300');

            // Encode URL properly for files with spaces
            const encodedPath = path.split('/').map(encodeURIComponent).join('/');
            const baseUrl = `https://${OWNER}.github.io/${encodedPath}`;

            output.innerText = baseUrl;

            // Show image preview if it's an image
            if (isImageFile(path)) {
                imagePreview.src = baseUrl;
                imagePreviewContainer.classList.remove('hidden');
                fontPreviewContainer.classList.add('hidden');
            } else if (isFontFile(path)) {
                // Show font preview if it's a font
                loadFontPreview(baseUrl, path);
                fontPreviewContainer.classList.remove('hidden');
                imagePreviewContainer.classList.add('hidden');
            } else {
                imagePreviewContainer.classList.add('hidden');
                fontPreviewContainer.classList.add('hidden');
            }
        }

        function loadFontPreview(fontUrl, path) {
            // Remove any existing preview font style
            const existingStyle = document.getElementById('previewFontStyle');
            if (existingStyle) {
                existingStyle.remove();
            }

            // Determine font format based on extension
            const ext = path.split('.').pop().toLowerCase();
            let format = 'woff2';
            if (ext === 'woff') format = 'woff';
            else if (ext === 'ttf') format = 'truetype';
            else if (ext === 'otf') format = 'opentype';

            // Create a new style element with @font-face
            const style = document.createElement('style');
            style.id = 'previewFontStyle';
            style.textContent = `
                @font-face {
                    font-family: 'PreviewFont';
                    src: url('${fontUrl}') format('${format}');
                    font-weight: normal;
                    font-style: normal;
                    font-display: swap;
                }
            `;
            document.head.appendChild(style);

            // Force the browser to load the font
            document.fonts.load('1em PreviewFont').then(() => {
                console.log('Font loaded successfully');
            }).catch(err => {
                console.error('Font failed to load:', err);
            });
        }

        function loadFontForListItem(fontUrl, fontId) {
            // Create unique font family name for this font
            const fontFamily = `Font_${fontId}`;

            // Check if style already exists
            if (document.getElementById(`fontStyle_${fontId}`)) {
                return fontFamily;
            }

            // Determine font format based on extension
            const ext = fontUrl.split('.').pop().split('?')[0].toLowerCase();
            let format = 'woff2';
            if (ext === 'woff') format = 'woff';
            else if (ext === 'ttf') format = 'truetype';
            else if (ext === 'otf') format = 'opentype';

            // Create style element
            const style = document.createElement('style');
            style.id = `fontStyle_${fontId}`;
            style.textContent = `
                @font-face {
                    font-family: '${fontFamily}';
                    src: url('${fontUrl}') format('${format}');
                    font-weight: normal;
                    font-style: normal;
                    font-display: swap;
                }
            `;
            document.head.appendChild(style);

            return fontFamily;
        }

        function copyToClipboard() {
            const text = document.getElementById('output').innerText;
            if (text.includes("Select a file")) return;

            const copyIcon = document.getElementById('copyIcon');
            const checkIcon = document.getElementById('checkIcon');
            const status = document.getElementById('copyStatus');
            const btn = document.getElementById('copyBtn');

            // Fallback for clipboard
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                
                // UI Feedback
                copyIcon.classList.add('hidden');
                checkIcon.classList.remove('hidden');
                status.classList.remove('opacity-0');
                btn.classList.add('bg-emerald-500/20', 'border-emerald-500/30');

                setTimeout(() => {
                    copyIcon.classList.remove('hidden');
                    checkIcon.classList.add('hidden');
                    status.classList.add('opacity-0');
                    btn.classList.remove('bg-emerald-500/20', 'border-emerald-500/30');
                }, 2000);
            } catch (err) {
                console.error('Copy failed', err);
            }
            
            document.body.removeChild(textArea);
        }

        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
