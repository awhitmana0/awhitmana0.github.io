<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Link Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        code { font-family: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', monospace; }

        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Autocomplete dropdown */
        .autocomplete-dropdown {
            max-height: 300px;
            overflow-y: auto;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .autocomplete-item {
            cursor: pointer;
            transition: background-color 0.15s;
        }
        .autocomplete-item:hover, .autocomplete-item.selected {
            background-color: #f1f5f9;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-900">

    <div class="max-w-2xl mx-auto space-y-6">
        <!-- Header -->
        <header class="flex items-center space-x-3 mb-8">
            <div class="bg-black text-white p-2.5 rounded-xl shadow-lg shadow-slate-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-github"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.28 1.15-.28 2.35 0 3.5-.73 1.02-1.08 2.25-1 3.5 0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Repo Link Generator</h1>
                <p class="text-sm text-slate-500 font-medium">awhitmana0.github.io</p>
            </div>
        </header>

        <!-- Main Tool Card -->
        <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-200 p-6 md:p-8 space-y-8 relative overflow-hidden">
            
            <!-- Loading State -->
            <div id="loading" class="flex flex-col items-center justify-center py-10 space-y-4">
                <div class="flex space-x-2">
                    <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce"></div>
                    <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce [animation-delay:-.3s]"></div>
                    <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce [animation-delay:-.5s]"></div>
                </div>
                <span class="text-sm text-slate-500 font-semibold uppercase tracking-wider">Indexing Repository...</span>
            </div>

            <!-- Error State (Hidden by default) -->
            <div id="errorBox" class="hidden p-4 bg-red-50 border border-red-100 rounded-xl text-red-700 text-sm">
                <p id="errorMessage"></p>
            </div>

            <!-- Input Section -->
            <div id="toolUI" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
                
                <!-- File Selection -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">Search Files</label>
                    <div class="relative">
                        <input
                            id="fileSearch"
                            type="text"
                            autocomplete="off"
                            placeholder="Type to search through all files..."
                            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all text-lg"
                            oninput="handleSearch()"
                            onkeydown="handleKeyDown(event)"
                            onfocus="handleSearch()"
                        >
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        </div>
                        <!-- Autocomplete Dropdown -->
                        <div id="autocompleteDropdown" class="hidden absolute top-full left-0 right-0 mt-2 bg-white border border-slate-200 rounded-2xl autocomplete-dropdown z-50"></div>
                    </div>
                </div>

                <!-- File Type Filters -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">Filter by Type</label>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="filterFiles('all')" id="filter-all" class="px-4 py-2 rounded-xl font-semibold text-sm transition-all bg-blue-500 text-white shadow-sm">
                            All Files
                        </button>
                        <button onclick="filterFiles('image')" id="filter-image" class="px-4 py-2 rounded-xl font-semibold text-sm transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                            Images
                        </button>
                        <button onclick="filterFiles('font')" id="filter-font" class="px-4 py-2 rounded-xl font-semibold text-sm transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                            Fonts
                        </button>
                        <button onclick="filterFiles('code')" id="filter-code" class="px-4 py-2 rounded-xl font-semibold text-sm transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                            Code
                        </button>
                        <button onclick="filterFiles('template')" id="filter-template" class="px-4 py-2 rounded-xl font-semibold text-sm transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                            Templates
                        </button>
                        <button onclick="filterFiles('other')" id="filter-other" class="px-4 py-2 rounded-xl font-semibold text-sm transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                            Other
                        </button>
                    </div>
                </div>

                <!-- Output Display -->
                <div class="pt-4 space-y-3">
                    <div class="flex justify-between items-end px-1">
                        <label class="text-sm font-bold text-slate-700">Generated URL</label>
                        <span id="copyStatus" class="text-[10px] uppercase font-bold text-blue-600 opacity-0 transition-opacity">Copied!</span>
                    </div>
                    <div class="relative group">
                        <div class="absolute -inset-0.5 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-1000 group-hover:duration-200"></div>
                        <div class="relative bg-slate-900 rounded-2xl p-6 overflow-hidden">
                            <pre id="output" class="text-blue-300 text-sm overflow-x-auto whitespace-pre-wrap break-all leading-relaxed min-h-[1.5rem] font-mono">Select a file from your repository above...</pre>
                            
                            <button 
                                id="copyBtn"
                                onclick="copyToClipboard()"
                                class="absolute right-3 top-3 p-2.5 bg-white/10 hover:bg-white/20 text-white rounded-xl transition-all border border-white/10 backdrop-blur-sm"
                                title="Copy to clipboard"
                            >
                                <svg id="copyIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-copy"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                <svg id="checkIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check hidden text-emerald-400"><path d="M20 6 9 17l-5-5"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Info -->
        <footer class="text-center py-4">
            <p class="text-xs text-slate-400 font-medium tracking-wide uppercase">Built for awhitmana0.github.io</p>
        </footer>
    </div>

    <script>
        const OWNER = 'awhitmana0';
        const REPO = 'awhitmana0.github.io';
        let allFiles = [];
        let currentFilter = 'all';
        let selectedIndex = -1;

        // File type extensions
        const IMAGE_EXTS = ['.svg', '.png', '.jpg', '.jpeg', '.gif', '.webp'];
        const FONT_EXTS = ['.woff', '.woff2', '.ttf', '.otf'];
        const CODE_EXTS = ['.js', '.css', '.html', '.json', '.yml', '.yaml'];
        const TEMPLATE_EXTS = ['.handlebars', '.hbs'];

        function getFileType(path) {
            const ext = '.' + path.split('.').pop().toLowerCase();
            if (IMAGE_EXTS.includes(ext)) return 'image';
            if (FONT_EXTS.includes(ext)) return 'font';
            if (CODE_EXTS.includes(ext)) return 'code';
            if (TEMPLATE_EXTS.includes(ext)) return 'template';
            return 'other';
        }

        function getFilteredFiles() {
            return currentFilter === 'all'
                ? allFiles
                : allFiles.filter(path => getFileType(path) === currentFilter);
        }

        function handleSearch() {
            const searchInput = document.getElementById('fileSearch');
            const query = searchInput.value.trim().toLowerCase();
            const dropdown = document.getElementById('autocompleteDropdown');

            selectedIndex = -1;

            if (query === '') {
                dropdown.classList.add('hidden');
                updateSnippet();
                return;
            }

            const filteredFiles = getFilteredFiles();
            const matches = filteredFiles.filter(path => path.toLowerCase().includes(query));

            if (matches.length === 0) {
                dropdown.classList.add('hidden');
                updateSnippet();
                return;
            }

            // Limit to 10 results
            const displayMatches = matches.slice(0, 10);

            dropdown.innerHTML = displayMatches.map((path, index) => `
                <div class="autocomplete-item px-5 py-3 text-sm border-b border-slate-100 last:border-b-0"
                     data-index="${index}"
                     data-path="${path}"
                     onclick="selectFile('${path.replace(/'/g, "\\'")}')">
                    ${highlightMatch(path, query)}
                </div>
            `).join('');

            dropdown.classList.remove('hidden');
            updateSnippet();
        }

        function highlightMatch(path, query) {
            const index = path.toLowerCase().indexOf(query.toLowerCase());
            if (index === -1) return path;

            const before = path.substring(0, index);
            const match = path.substring(index, index + query.length);
            const after = path.substring(index + query.length);

            return `${before}<span class="font-semibold text-blue-600">${match}</span>${after}`;
        }

        function selectFile(path) {
            document.getElementById('fileSearch').value = path;
            document.getElementById('autocompleteDropdown').classList.add('hidden');
            selectedIndex = -1;
            updateSnippet();
        }

        function handleKeyDown(event) {
            const dropdown = document.getElementById('autocompleteDropdown');
            const items = dropdown.querySelectorAll('.autocomplete-item');

            if (dropdown.classList.contains('hidden') || items.length === 0) {
                return;
            }

            if (event.key === 'ArrowDown') {
                event.preventDefault();
                selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
                updateSelection(items);
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                selectedIndex = Math.max(selectedIndex - 1, -1);
                updateSelection(items);
            } else if (event.key === 'Enter') {
                event.preventDefault();
                if (selectedIndex >= 0 && selectedIndex < items.length) {
                    const path = items[selectedIndex].getAttribute('data-path');
                    selectFile(path);
                }
            } else if (event.key === 'Escape') {
                dropdown.classList.add('hidden');
                selectedIndex = -1;
            }
        }

        function updateSelection(items) {
            items.forEach((item, index) => {
                if (index === selectedIndex) {
                    item.classList.add('selected');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        function filterFiles(type) {
            currentFilter = type;

            // Update button styles
            document.querySelectorAll('[id^="filter-"]').forEach(btn => {
                btn.classList.remove('bg-blue-500', 'text-white', 'shadow-sm');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });

            const activeBtn = document.getElementById(`filter-${type}`);
            activeBtn.classList.remove('bg-slate-100', 'text-slate-600');
            activeBtn.classList.add('bg-blue-500', 'text-white', 'shadow-sm');

            // Clear search and refresh dropdown
            document.getElementById('fileSearch').value = '';
            document.getElementById('autocompleteDropdown').classList.add('hidden');
            updateSnippet();
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (event) => {
            const searchInput = document.getElementById('fileSearch');
            const dropdown = document.getElementById('autocompleteDropdown');

            if (searchInput && dropdown && !searchInput.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
            }
        });

        async function init() {
            const loading = document.getElementById('loading');
            const toolUI = document.getElementById('toolUI');
            const errorBox = document.getElementById('errorBox');
            const errorMessage = document.getElementById('errorMessage');

            try {
                // Using the recursive Tree API to get ALL files at once
                // This fetches the tree for the 'main' branch
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/main?recursive=1`);

                if (!response.ok) throw new Error('Could not fetch repository data. Ensure the repo is public.');

                const data = await response.json();

                // Filter out directories, only keep blobs (files)
                allFiles = data.tree
                    .filter(item => item.type === 'blob')
                    .map(item => item.path);

                loading.classList.add('hidden');
                toolUI.classList.remove('hidden');
            } catch (err) {
                loading.classList.add('hidden');
                errorBox.classList.remove('hidden');
                errorMessage.innerText = err.message;
            }
        }

        function updateSnippet() {
            const path = document.getElementById('fileSearch').value.trim();
            const output = document.getElementById('output');

            if (!path) {
                output.innerText = "Select a file from your repository above...";
                output.classList.add('text-slate-500');
                output.classList.remove('text-blue-300');
                return;
            }

            // Validate file exists
            if (!allFiles.includes(path)) {
                output.innerText = "File not found. Please select from the list.";
                output.classList.add('text-slate-500');
                output.classList.remove('text-blue-300');
                return;
            }

            output.classList.remove('text-slate-500');
            output.classList.add('text-blue-300');

            // Encode URL properly for files with spaces
            const encodedPath = path.split('/').map(encodeURIComponent).join('/');
            const baseUrl = `https://${OWNER}.github.io/${encodedPath}`;

            output.innerText = baseUrl;
        }

        function copyToClipboard() {
            const text = document.getElementById('output').innerText;
            if (text.includes("Select a file")) return;

            const copyIcon = document.getElementById('copyIcon');
            const checkIcon = document.getElementById('checkIcon');
            const status = document.getElementById('copyStatus');
            const btn = document.getElementById('copyBtn');

            // Fallback for clipboard
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                
                // UI Feedback
                copyIcon.classList.add('hidden');
                checkIcon.classList.remove('hidden');
                status.classList.remove('opacity-0');
                btn.classList.add('bg-emerald-500/20', 'border-emerald-500/30');

                setTimeout(() => {
                    copyIcon.classList.remove('hidden');
                    checkIcon.classList.add('hidden');
                    status.classList.add('opacity-0');
                    btn.classList.remove('bg-emerald-500/20', 'border-emerald-500/30');
                }, 2000);
            } catch (err) {
                console.error('Copy failed', err);
            }
            
            document.body.removeChild(textArea);
        }

        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
